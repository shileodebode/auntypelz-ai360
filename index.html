<!DOCTYPE html>

  <style>

      font-family: Arial, sans-serif;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:#111827;
      padding:40px;
      border-radius:20px;
      text-align:center;

      box-shadow:0 10px 30px rgba(0,0,0,0.3);

    h1{
      margin-bottom:15px;
      font-size:40px;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
      font-size:18px;
    }

    a{
      display:inline-block;
      margin-top:25px;
      padding:14px 22px;
      background:#14b8a6;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      font-size:16px;
    }

    a:hover{
      background:#0f766e;
    }
  </style>
